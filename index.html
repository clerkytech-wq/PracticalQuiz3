<script>
/* ════════════════════════════════════════════════════
   COMPONENT: orbit-circle
   Uses THREE.LineLoop — a native WebGL line primitive.
   This is the professional standard used in production
   3D apps: one perfect smooth circle, zero polygon
   artifacts, no wireframe triangles, 1px GPU line.
════════════════════════════════════════════════════ */
AFRAME.registerComponent('orbit-circle', {
  schema: {
    radius:   { type:'float', default:10    },
    color:    { type:'color', default:'#7aacdd' },
    opacity:  { type:'float', default:0.40  },
    segments: { type:'int',   default:360   }
  },
  init: function () {
    const { radius, color, opacity, segments } = this.data;
    const pts = [];
    for (let i = 0; i <= segments; i++) {
      const a = (i / segments) * Math.PI * 2;
      pts.push(new THREE.Vector3(Math.cos(a) * radius, 0, Math.sin(a) * radius));
    }
    const geo  = new THREE.BufferGeometry().setFromPoints(pts);
    const mat  = new THREE.LineBasicMaterial({
      color:       new THREE.Color(color),
      transparent: true,
      opacity:     opacity,
      depthWrite:  false
    });
    this.el.object3D.add(new THREE.LineLoop(geo, mat));
  }
});

/* ════════════════════════════════════════════════════
   COMPONENT: billboard  (labels always face camera)
════════════════════════════════════════════════════ */
AFRAME.registerComponent('billboard', {
  tick: function () {
    const cam = document.getElementById('cam');
    if (!cam) return;
    const wp = new THREE.Vector3();
    cam.object3D.getWorldPosition(wp);
    this.el.object3D.lookAt(wp);
  }
});

/* ════════════════════════════════════════════════════
   SCENE LOADED
════════════════════════════════════════════════════ */
document.getElementById('scene').addEventListener('loaded', () => {

  /* Build 8 crisp orbit circles via THREE.LineLoop */
  const radii = [8, 13, 19, 26, 38, 52, 67, 83];
  const container = document.getElementById('orbit-lines');
  radii.forEach(r => {
    const el = document.createElement('a-entity');
    el.setAttribute('orbit-circle', `radius:${r}; color:#7aacdd; opacity:0.42; segments:360`);
    container.appendChild(el);
  });

  /* Billboard all planet name labels */
  document.querySelectorAll('a-text').forEach(t => {
    if (!t.id.startsWith('info-') && t.id !== '') {
      t.setAttribute('billboard', '');
    }
  });

  /* Fade hint after 6 s */
  setTimeout(() => {
    const h = document.getElementById('hint');
    if (h) h.style.opacity = '0';
  }, 6000);

  requestAnimationFrame(tick);
});

/* ════════════════════════════════════════════════════
   ORBITAL & SPIN DATA
   Real relative periods, Mercury baseline = 1.0
   Speed fixed at 10x per project requirement
════════════════════════════════════════════════════ */
const SPEED    = 10;
const BASE_SPD = 0.014; // Mercury deg/ms at 1x

const PLANETS = [
  { piv:'piv-mercury', ratio:1.0000,   start:  45 },
  { piv:'piv-venus',   ratio:0.3911,   start: 110 },
  { piv:'piv-earth',   ratio:0.2411,   start: 200 },
  { piv:'piv-mars',    ratio:0.1281,   start: 290 },
  { piv:'piv-jupiter', ratio:0.02032,  start: 160 },
  { piv:'piv-saturn',  ratio:0.008183, start:  60 },
  { piv:'piv-uranus',  ratio:0.002867, start: 330 },
  { piv:'piv-neptune', ratio:0.001461, start: 240 },
];

const SPIN = {
  'sun':0.0016, 'pl-mercury':0.0005, 'pl-venus':0.00025,
  'pl-earth':0.0085, 'pl-mars':0.0080, 'pl-jupiter':0.0220,
  'pl-saturn':0.0200, 'pl-uranus':0.0135, 'pl-neptune':0.0140
};

const ang  = {};
PLANETS.forEach(p => ang[p.piv] = p.start);
ang['piv-moon'] = 0;
const spin = {};
Object.keys(SPIN).forEach(k => spin[k] = 0);
let lastTs = null;

/* ════════════════════════════════════════════════════
   INFO PANEL — click planet → floating 3D card
════════════════════════════════════════════════════ */
/* ===============================
   PLANET INFO PANEL CLICK HANDLER
=============================== */

// Get panel and text elements
const panel  = document.getElementById('info-panel');
const iTitle = document.getElementById('info-title');
const iL     = ['info-l1','info-l2','info-l3','info-l4'].map(id => document.getElementById(id));

// State
let pOpen  = false;
let pTimer = null;

// Function to open panel
function openPanel(el) {
  if (!el) return;

  // Fill in info
  iTitle.setAttribute('value', el.getAttribute('data-name') || '');
  iL[0].setAttribute('value', el.getAttribute('data-line1') || '');
  iL[1].setAttribute('value', el.getAttribute('data-line2') || '');
  iL[2].setAttribute('value', el.getAttribute('data-line3') || '');
  iL[3].setAttribute('value', el.getAttribute('data-line4') || '');

  // Position panel relative to camera
  const rig = document.getElementById('rig');
  const cam = document.getElementById('cam');
  const rPos = rig.getAttribute('position');
  const cRot = cam.getAttribute('rotation');

  // Convert rotation to radians
  const yaw = THREE.MathUtils.degToRad(cRot.y);
  const dist = 15; // closer distance

  panel.setAttribute('position', {
    x: rPos.x + Math.sin(yaw) * dist,
    y: rPos.y + 5,
    z: rPos.z - Math.cos(yaw) * dist
  });

  panel.setAttribute('rotation', { x:0, y:cRot.y, z:0 });
  panel.setAttribute('visible', true);
  pOpen = true;

  // Auto-close after 9s
  clearTimeout(pTimer);
  pTimer = setTimeout(closePanel, 9000);

  console.log('Planet clicked:', el.getAttribute('data-name')); // Debug
}

// Function to close panel
function closePanel() {
  panel.setAttribute('visible', false);
  pOpen = false;
}

// Attach click listener to all clickable planets
document.querySelectorAll('.clickable').forEach(el => {
  // Desktop & VR click
  el.addEventListener('click', e => { 
    e.stopPropagation();
    openPanel(el);
  });

  // Optional: touch / hover (VR controller gaze)
  el.addEventListener('mouseenter', e => { 
    e.stopPropagation(); 
    // Could add hover effect here
  });
});

// Close panel if click elsewhere
document.getElementById('scene').addEventListener('click', e => {
  if (!e.target.classList.contains('clickable') && pOpen) closePanel();
});

/* ════════════════════════════════════════════════════
   ANIMATION LOOP
════════════════════════════════════════════════════ */
function tick(ts) {
  requestAnimationFrame(tick);
  if (!lastTs) { lastTs = ts; return; }
  const dt  = ts - lastTs;
  lastTs    = ts;
  const eff = dt * SPEED;

  PLANETS.forEach(({ piv, ratio }) => {
    ang[piv] = (ang[piv] + BASE_SPD * ratio * eff) % 360;
    const el = document.getElementById(piv);
    if (el) el.setAttribute('rotation', { x:0, y:ang[piv], z:0 });
  });

  ang['piv-moon'] = (ang['piv-moon'] + BASE_SPD * 3.2 * eff) % 360;
  const mp = document.getElementById('piv-moon');
  if (mp) mp.setAttribute('rotation', { x:0, y:ang['piv-moon'], z:0 });

  Object.entries(SPIN).forEach(([id, spd]) => {
    spin[id] = (spin[id] + spd * eff) % 360;
    const el = document.getElementById(id);
    if (el) el.setAttribute('rotation', { x:0, y:spin[id], z:0 });
  });
}
</script>
</body>
